<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Manipuri Stemmer{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>
    <!-- Video Background -->
    <video autoplay muted loop playsinline id="bgVideo">
       <source src="{{ url_for('static', filename='videos/video.mp4') }}" type="video/mp4">
        Your browser does not support HTML5 video.
    </video>
    <div class="overlay"></div>  <!-- Dark overlay for better text contrast -->

    <nav class="navbar navbar-expand-lg navbar-dark bg-gradient">
        <div class="container">
            <a class="navbar-brand" href="{{ url_for('index') }}">
                <i class="fas fa-feather-alt"></i> Manipuri Stemmer
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
    <li class="nav-item"><a class="nav-link" href="{{ url_for('index') }}"><i class="fas fa-pen-fancy"></i> Stemmer</a></li>
    <li class="nav-item"><a class="nav-link" href="{{ url_for('batch') }}"><i class="fas fa-layer-group"></i> Batch</a></li>
    <li class="nav-item"><a class="nav-link" href="{{ url_for('evaluate') }}"><i class="fas fa-chart-line"></i> Evaluate</a></li>
    <li class="nav-item"><a class="nav-link" href="{{ url_for('dashboard') }}"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
</ul>
            </div>
        </div>
    </nav>

    <main class="container my-4">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer mt-5 py-3 bg-light">
        <div class="container text-center" id="footer-text">
            <span class="text-muted">Manipuri Stemmer for Meitei Mayek | A Grapheme-Aware Rule-Based Stemmer</span>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
